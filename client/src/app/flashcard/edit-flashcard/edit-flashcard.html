<div class="container-md">
  <h1 class="text-center">Edit Card</h1>

  <form [formGroup]="editForm" (ngSubmit)="updateCard()" class="needs-validation" novalidate>
    <div class="input-group mb-3">
      <span class="input-group-text">Title</span>
      <input type="text" formControlName="title" class="form-control" [class.is-invalid]="editForm.get('title')?.invalid && editForm.get('title')?.touched">
      @if(editForm.get('title')?.hasError('minlength')){
        <div class="invalid-feedback">
          Title should have min 2 characters.
        </div>
      } @else {
        @if(editForm.get('title')?.hasError('maxlength')){
            <div class="invalid-feedback">
              Title's max characters reached.
            </div>
          }
        @else {
          @if(editForm.get('title')?.touched){
          <div class="invalid-feedback">Please insert a title.</div>
        }
        }
      }
    </div>

    <div class="form-group">
      <label for="question-editor" class="form-label">Question</label>
      <div class="editor-toolbar">
        <button (click)="questionEditor.chain().focus().toggleBold().run()" [class.is-active]="questionEditor.isActive('bold')">bold</button>
        <button (click)="questionEditor.chain().focus().toggleItalic().run()" [class.is-active]="questionEditor.isActive('italic')">italic</button>
        <button (click)="questionEditor.chain().focus().toggleStrike().run()" [class.is-active]="questionEditor.isActive('strike')">strike</button>
        <button type="button" (click)="questionEditor.commands.insertContent('$')">Add Inline Math</button>
      </div>
      <tiptap-editor [editor]="questionEditor"></tiptap-editor>
    </div>

    <div class="form-group">
      <label for="answer-editor" class="form-label">Answer</label>
      <div class="editor-toolbar">
        <button (click)="answerEditor.chain().focus().toggleBold().run()" [class.is-active]="answerEditor.isActive('bold')">bold</button>
        <button (click)="answerEditor.chain().focus().toggleItalic().run()" [class.is-active]="answerEditor.isActive('italic')">italic</button>
        <button (click)="answerEditor.chain().focus().toggleStrike().run()" [class.is-active]="answerEditor.isActive('strike')">strike</button>
        <button type="button" (click)="answerEditor.commands.insertContent('$')">Add Inline Math</button>
      </div>
      <tiptap-editor [editor]="answerEditor"></tiptap-editor>
    </div>

    <div class="d-flex justify-content-center mt-3">
      <button type="submit" class="btn btn-primary">Save Changes</button>
    </div>
  </form>
</div>
<app-toast></app-toast>
